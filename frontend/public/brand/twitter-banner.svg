<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 500" width="1500" height="500">
  <defs>
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#00e5cc" stroke-opacity="0.03" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1500" height="500" fill="#060a13"/>
  <rect width="1500" height="500" fill="url(#grid)"/>

  <!-- ==================== CENTER (headline + sub) ==================== -->

  <!-- Main headline -->
  <text x="720" y="220" text-anchor="middle" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="42" font-weight="800" fill="#f1f5f9" letter-spacing="-0.5">Multi-Agent Commerce</text>
  <text x="720" y="272" text-anchor="middle" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="42" font-weight="800" fill="#f1f5f9" letter-spacing="-0.5">on X Layer</text>

  <!-- Subline -->
  <text x="720" y="312" text-anchor="middle" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="14" fill="#8a94a6" letter-spacing="2">Onboard · Coordinate · Pay · Settle · Prove</text>

  <!-- ==================== RIGHT (agent roles) ==================== -->

  <!-- Sentinel -->
  <circle cx="1220" cy="180" r="5" fill="#00e5cc"/>
  <text x="1236" y="185" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="16" font-weight="600" fill="#f1f5f9">Sentinel</text>

  <!-- Arbiter -->
  <circle cx="1220" cy="220" r="5" fill="#f0b232"/>
  <text x="1236" y="225" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="16" font-weight="600" fill="#f1f5f9">Arbiter</text>

  <!-- Executor -->
  <circle cx="1220" cy="260" r="5" fill="#3b82f6"/>
  <text x="1236" y="265" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="16" font-weight="600" fill="#f1f5f9">Executor</text>

  <!-- Evaluator -->
  <circle cx="1220" cy="300" r="5" fill="#10b981"/>
  <text x="1236" y="305" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="16" font-weight="600" fill="#f1f5f9">Evaluator</text>

  <!-- ==================== BOTTOM BAR ==================== -->
  <text x="750" y="478" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="9" fill="#3a4456" letter-spacing="0.8">OKX Onchain OS · x402 · ERC-8004 · ERC-8183 · MCP · A2A · Mainnet Live</text>
</svg>