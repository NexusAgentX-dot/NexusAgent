<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 500" width="1500" height="500">
  <!-- Twitter/X Banner — 1500x500 -->

  <!-- Background -->
  <rect width="1500" height="500" fill="#060a13"/>

  <!-- Subtle grid pattern -->
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#00e5cc" stroke-opacity="0.03" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="1500" height="500" fill="url(#grid)"/>

  <!-- Left: Logo icon -->
  <rect x="100" y="155" width="190" height="190" rx="36" fill="#0f1724" stroke="#00e5cc" stroke-width="8"/>
  <path
    d="M 148,308 L 148,192 L 172,192 L 218,272 L 218,192 L 242,192 L 242,308 L 218,308 L 172,228 L 172,308 Z"
    fill="#ffffff"
  />

  <!-- Left: Wordmark -->
  <text x="320" y="275" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="52" font-weight="800" fill="#ffffff" letter-spacing="-0.5">NexusAgent</text>

  <!-- Center-right: Tagline -->
  <text x="750" y="195" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="20" font-weight="400" fill="#8a94a6" letter-spacing="0.5">Multi-Agent Commerce on X Layer</text>

  <!-- Agent flow: 4 dots connected by lines -->
  <!-- Sentinel -->
  <circle cx="770" cy="270" r="16" fill="none" stroke="#00e5cc" stroke-width="2"/>
  <text x="770" y="275" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="12" font-weight="600" fill="#00e5cc">S</text>
  <text x="770" y="308" text-anchor="middle" font-family="'Inter',sans-serif" font-size="10" fill="#556">Sentinel</text>

  <!-- Arrow -->
  <line x1="790" y1="270" x2="860" y2="270" stroke="#00e5cc" stroke-opacity="0.3" stroke-width="1"/>
  <path d="M 855,266 L 862,270 L 855,274" fill="none" stroke="#00e5cc" stroke-opacity="0.3" stroke-width="1"/>

  <!-- Arbiter -->
  <circle cx="890" cy="270" r="16" fill="none" stroke="#00e5cc" stroke-width="2"/>
  <text x="890" y="275" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="12" font-weight="600" fill="#00e5cc">A</text>
  <text x="890" y="308" text-anchor="middle" font-family="'Inter',sans-serif" font-size="10" fill="#556">Arbiter</text>

  <!-- Arrow -->
  <line x1="910" y1="270" x2="980" y2="270" stroke="#00e5cc" stroke-opacity="0.3" stroke-width="1"/>
  <path d="M 975,266 L 982,270 L 975,274" fill="none" stroke="#00e5cc" stroke-opacity="0.3" stroke-width="1"/>

  <!-- Executor -->
  <circle cx="1010" cy="270" r="16" fill="none" stroke="#00e5cc" stroke-width="2"/>
  <text x="1010" y="275" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="12" font-weight="600" fill="#00e5cc">E</text>
  <text x="1010" y="308" text-anchor="middle" font-family="'Inter',sans-serif" font-size="10" fill="#556">Executor</text>

  <!-- Arrow -->
  <line x1="1030" y1="270" x2="1100" y2="270" stroke="#00e5cc" stroke-opacity="0.3" stroke-width="1"/>
  <path d="M 1095,266 L 1102,270 L 1095,274" fill="none" stroke="#00e5cc" stroke-opacity="0.3" stroke-width="1"/>

  <!-- Evaluator -->
  <circle cx="1130" cy="270" r="16" fill="none" stroke="#00e5cc" stroke-width="2"/>
  <text x="1130" y="275" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="12" font-weight="600" fill="#00e5cc">V</text>
  <text x="1130" y="308" text-anchor="middle" font-family="'Inter',sans-serif" font-size="10" fill="#556">Evaluator</text>

  <!-- Bottom bar: protocol tags -->
  <text x="750" y="400" font-family="'JetBrains Mono',monospace" font-size="11" fill="#3a4456" letter-spacing="1">Built on X Layer · OKX Onchain OS · x402 · ERC-8004 · ERC-8183</text>
</svg>