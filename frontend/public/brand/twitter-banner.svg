<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 500" width="1500" height="500">
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#00e5cc" stroke-width="0.5" opacity="0.03"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1500" height="500" fill="#060a13"/>
  <rect width="1500" height="500" fill="url(#grid)"/>

  <!-- === LEFT SIDE: Text block (x: 480–1000) === -->

  <!-- NexusAgent -->
  <text x="500" y="145" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="52" font-weight="700" fill="#f1f5f9" letter-spacing="-1">NexusAgent</text>

  <!-- Multi-Agent Commerce on X Layer -->
  <text y="200" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="26" fill="#f1f5f9" letter-spacing="-0.3">
    <tspan x="500">Multi-Agent Commerce </tspan><tspan fill="#00e5cc">on X Layer</tspan>
  </text>

  <!-- Subtitle -->
  <text x="500" y="248" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="15" fill="#9ca3af" letter-spacing="0.5">Onboard · Coordinate · Pay · Settle · Prove</text>

  <!-- === RIGHT SIDE: Agent pipeline (x: 1060–1420) === -->

  <!-- Vertical connector line -->
  <line x1="1078" y1="130" x2="1078" y2="318" stroke="#00e5cc" stroke-width="1" opacity="0.12"/>

  <!-- Sentinel -->
  <circle cx="1078" cy="132" r="5" fill="#00e5cc"/>
  <text x="1098" y="137" font-family="'JetBrains Mono','SF Mono',monospace" font-size="15" font-weight="600" fill="#f1f5f9">Sentinel</text>
  <text x="1210" y="137" font-family="'JetBrains Mono','SF Mono',monospace" font-size="14" fill="#9ca3af">→ Signal</text>

  <!-- Arbiter -->
  <circle cx="1078" cy="194" r="5" fill="#f0b232"/>
  <text x="1098" y="199" font-family="'JetBrains Mono','SF Mono',monospace" font-size="15" font-weight="600" fill="#f1f5f9">Arbiter</text>
  <text x="1210" y="199" font-family="'JetBrains Mono','SF Mono',monospace" font-size="14" fill="#9ca3af">→ Decision</text>

  <!-- Executor -->
  <circle cx="1078" cy="256" r="5" fill="#3b82f6"/>
  <text x="1098" y="261" font-family="'JetBrains Mono','SF Mono',monospace" font-size="15" font-weight="600" fill="#f1f5f9">Executor</text>
  <text x="1210" y="261" font-family="'JetBrains Mono','SF Mono',monospace" font-size="14" fill="#9ca3af">→ Settle</text>

  <!-- Evaluator -->
  <circle cx="1078" cy="318" r="5" fill="#10b981"/>
  <text x="1098" y="323" font-family="'JetBrains Mono','SF Mono',monospace" font-size="15" font-weight="600" fill="#f1f5f9">Evaluator</text>
  <text x="1210" y="323" font-family="'JetBrains Mono','SF Mono',monospace" font-size="14" fill="#9ca3af">→ Proof</text>

  <!-- === BOTTOM BAR === -->

  <!-- Separator line -->
  <line x1="500" y1="440" x2="1450" y2="440" stroke="#00e5cc" stroke-width="0.5" opacity="0.2"/>

  <!-- Bottom text -->
  <text x="500" y="468" font-family="'JetBrains Mono','SF Mono',monospace" font-size="11" fill="#6b7280" letter-spacing="0.5">OKX Onchain OS · x402 · ERC-8004 · ERC-8183 · MCP · Mainnet Deployed</text>

</svg>