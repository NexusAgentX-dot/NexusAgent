services:
  - type: web
    name: nexusagent-backend-preview
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: PORT
        value: 10000
      - key: NEXUSAGENT_ALPHA_EXECUTION_MODE
        value: disabled
      - key: NEXUSAGENT_ALLOWED_ORIGINS
        sync: false

  - type: static
    name: nexusagent-frontend-preview
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
